name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_DIR: /var/www/sheba

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Verify deployment requirements
      run: |
        echo "Checking required files..."
        test -f requirements.txt || exit 1
        test -f manage.py || exit 1
        test -f deploy_scripts/update_deploy.sh || exit 1
        echo "✅ All required files present"
      
    - name: 🚀 Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🔄 Starting deployment process..."
          
          cd ${{ env.PROJECT_DIR }}
          
          # Pull latest code
          echo "📥 Pulling latest code..."
          git pull origin main
          
          # Make deploy script executable
          chmod +x deploy_scripts/update_deploy.sh
          
          # Run deployment script
          echo "🔧 Running deployment script..."
          bash deploy_scripts/update_deploy.sh
          
          # Verify services are running
          echo "🔍 Verifying services..."
          sudo systemctl is-active gunicorn || echo "⚠️  Gunicorn is not running!"
          sudo systemctl is-active nginx || echo "⚠️  Nginx is not running!"
          
          echo "✅ Deployment completed successfully!"
          
    - name: 🎉 Deployment Success
      if: success()
      run: |
        echo "🎊 Successfully deployed to production!"
        echo "🌐 Backend URL: http://${{ secrets.SERVER_HOST }}"
        
    - name: ❌ Deployment Failed
      if: failure()
      run: |
        echo "💥 Deployment failed! Check the logs above for details."
        exit 1
